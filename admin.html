<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — LingCode</title>
  <link rel="stylesheet" href="style.css?v=20260531a">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #1a1a1a;
      --bg-card-hover: #242424;
      --text: #ffffff;
      --text-muted: #888888;
      --border: #333333;
      --accent: #667eea;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .admin-header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .admin-header button {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .admin-header button:hover {
      opacity: 0.9;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      padding: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
    }

    .admin-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 10px 15px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    .filter-select {
      padding: 10px 15px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .users-table th {
      padding: 15px;
      text-align: left;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .users-table td {
      padding: 15px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .users-table tr:last-child td {
      border-bottom: none;
    }

    .users-table tr:hover {
      background: var(--bg-card-hover);
    }

    .tier-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .tier-free {
      background: rgba(0, 208, 132, 0.2);
      color: #00d084;
    }

    .tier-pro {
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
    }

    .tier-max {
      background: rgba(200, 100, 240, 0.2);
      color: #c864f0;
    }

    .tier-dropdown {
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .action-btn {
      padding: 6px 12px;
      margin: 0 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .error {
      padding: 15px;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 6px;
      color: #ff6b6b;
      margin-bottom: 20px;
    }

    .success {
      padding: 15px;
      background: rgba(0, 208, 132, 0.1);
      border: 1px solid rgba(0, 208, 132, 0.3);
      border-radius: 6px;
      color: #00d084;
      margin-bottom: 20px;
    }

    .auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
    }

    .login-form {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .login-form h1 {
      margin: 0 0 20px 0;
      font-size: 1.5rem;
    }

    .login-form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      box-sizing: border-box;
    }

    .login-form button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-form button:hover {
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .admin-controls {
        flex-direction: column;
      }

      .users-table {
        font-size: 0.8rem;
      }

      .users-table th,
      .users-table td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<div id="auth-screen" class="auth-screen">
  <div class="login-form">
    <h1>Admin Login</h1>
    <input type="email" id="admin-email" placeholder="Admin email" />
    <input type="password" id="admin-password" placeholder="Admin password" />
    <button onclick="loginAdmin()">Sign In</button>
  </div>
</div>

<div id="admin-panel" style="display: none;">
  <div class="admin-container">
    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <button onclick="logoutAdmin()">Sign Out</button>
    </div>

    <div id="message"></div>

    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-label">Total Users</div>
        <div class="stat-value" id="total-users">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Free Tier</div>
        <div class="stat-value" id="free-users">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pro Tier</div>
        <div class="stat-value" id="pro-users">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Max Pro Tier</div>
        <div class="stat-value" id="max-users">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Apps Generated</div>
        <div class="stat-value" id="total-apps">0</div>
      </div>
    </div>

    <div class="admin-controls">
      <input type="text" class="search-box" id="search-box" placeholder="Search by email..." />
      <select class="filter-select" id="tier-filter">
        <option value="">All Tiers</option>
        <option value="free">Free</option>
        <option value="pro">Pro</option>
        <option value="max_pro">Max Pro</option>
      </select>
    </div>

    <div id="users-container">
      <div class="loading">Loading users...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initAdmin } from './admin.js?v=' + Date.now();
  window.initAdmin = initAdmin;
  window.loginAdmin = loginAdmin;
  window.logoutAdmin = logoutAdmin;
  window.changeTier = changeTier;

  async function loginAdmin() {
    const email = document.getElementById('admin-email').value;
    const password = document.getElementById('admin-password').value;

    if (!email || !password) {
      alert('Please enter email and password');
      return;
    }

    // Simple check: email must be admin and password must match
    // In production, use proper authentication
    if (email === 'admin@lingcode.dev' && password === 'changeme') {
      localStorage.setItem('admin-token', 'authenticated');
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      await initAdmin();
    } else {
      alert('Invalid credentials');
    }
  }

  function logoutAdmin() {
    localStorage.removeItem('admin-token');
    location.reload();
  }

  // Check if already logged in
  if (localStorage.getItem('admin-token')) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    initAdmin();
  }
</script>
<script src="admin.js?v=" + Date.now() type="module"></script>

  <script src="/site-chat-widget.js?v=20260603" defer></script>
</body>
</html>
