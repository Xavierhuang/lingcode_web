  <script>
(function () {
  // Honor ?next=<path> so callers like /zh/try.html?next=/zh/try.html
  // return the user to where they came from. Same rules as EN: only
  // same-origin paths starting with '/' (and not '//') are allowed.
  function nextDest() {
    try {
      var p = new URLSearchParams(window.location.search).get('next');
      if (p && p.startsWith('/') && !p.startsWith('//')) return p;
    } catch (_) {}
    return '/account.html';
  }
  var dest = nextDest();

  fetch('/api/account/me', { credentials: 'include', cache: 'no-store' })
    .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
    .then(function (x) {
      if (x && x.ok && x.j && x.j.ok) window.location.replace(dest);
    })
    .catch(function () {});

  // Patch the Google sign-in link's `next` to forward the destination.
  var google = document.querySelector('a[href^="/auth/google"]');
  if (google) {
    var gu = new URL(google.getAttribute('href'), window.location.origin);
    gu.searchParams.set('next', dest);
    google.setAttribute('href', gu.pathname + gu.search);
  }

  // Stash for /account.html as a fallback if server-side `next` propagation
  // ever fails (e.g., browser-tab change wiping the form-based flow).
  if (dest !== '/account.html') {
    try { sessionStorage.setItem('lingcode.next', dest); } catch (_) {}
  }

  var el = document.getElementById('account-browser-link');
  if (!el) return;
  var u = new URL('/oauth/authorize', window.location.origin);
  u.searchParams.set('redirect_uri', window.location.origin + '/oauth/web-callback');
  u.searchParams.set('response_type', 'code');
  u.searchParams.set('state', 'web');
  u.searchParams.set('oauth_mode', 'signin');
  u.searchParams.set('next', dest);
  el.href = u.toString();
})();
  </script>
