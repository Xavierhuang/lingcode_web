    .cli-snippet {

    .actions-row button.danger {

    .cli-guest { text-align: center; padding: 48px 24px; color: var(--text-muted); }

      <h1>LingCode CLI token</h1>

      <p class="cli-guest" id="cli-loading">Loading…</p>
    </div>

  <script src="nav.js?v=202605131900" defer></script>
  <script>
(function () {
  var root = document.getElementById('cli-root');
  var loading = document.getElementById('cli-loading');

  // Device-flow params: when the CLI starts a localhost listener and opens
  // this page with ?session=<uuid>&redirect=http://localhost:<port>, we hand
  // the token off automatically instead of asking the user to copy/paste.
  var params = new URLSearchParams(window.location.search);
  var cliSession = params.get('session');
  var cliRedirect = params.get('redirect');
  var isDeviceFlow = !!(cliSession && cliRedirect);

  function returnSelfPath() {
    // Preserve session/redirect when bouncing through sign-in.
    return '/cli-token.html' + window.location.search;
  }

  function showGuest() {
    if (loading) loading.remove();
    var next = encodeURIComponent(returnSelfPath());
    root.innerHTML =
      '<div class="cli-guest">' +
        '<p>Sign in to mint a CLI token tied to your account.</p>' +
        '<p><a href="/signin.html?next=' + next + '">Sign in</a> or <a href="/signup.html?next=' + next + '">Create an account</a></p>' +
      '</div>';
  }

  function showDeviceFlowDone() {
    if (loading) loading.remove();
    root.innerHTML =
      '<div class="cli-card" style="text-align:center">' +
        '<h2>✓ CLI signed in</h2>' +
        '<p>You can close this tab and return to your terminal.</p>' +
      '</div>';
  }

  function showDeviceFlowFailed(message) {
    if (loading) loading.remove();
    root.innerHTML =
      '<div class="cli-card" style="text-align:center">' +
        '<h2>Could not hand off to the CLI</h2>' +
        '<p>' + escapeHtml(message || 'The local CLI listener did not respond.') + '</p>' +
        '<p style="margin-top:12px"><a href="/cli-token.html">Generate the token manually instead.</a></p>' +
      '</div>';
  }

  function deliverToCLI(token) {
    // Validate the redirect URL points at localhost — a misuse safeguard so
    // a phishing page can't pass an arbitrary redirect_uri and exfiltrate
    // someone's CLI token.
    var u;
    try { u = new URL(cliRedirect); } catch (_) {
      showDeviceFlowFailed('Invalid CLI callback URL.');
      return;
    }
    var host = u.hostname;
    var ok = (host === 'localhost' || host === '127.0.0.1' || host === '::1');
    if (!ok) {
      showDeviceFlowFailed('Refusing to redirect to a non-localhost URL.');
      return;
    }
    // Append session + token to the redirect.
    u.searchParams.set('session', cliSession);
    u.searchParams.set('token', token);
    showDeviceFlowDone();
    // Tiny delay so the user sees the success message before the browser
    // navigates (and most CLIs auto-close their listener after the GET).
    setTimeout(function () { window.location.href = u.toString(); }, 250);
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function render(token) {
    if (loading) loading.remove();
    root.innerHTML =
      '<div class="cli-card">' +
        '<h2>Your CLI token</h2>' +
        '<p>Use this to authenticate the <code>lingcode</code> CLI against your account so it can run LingModel queries through your hosted quota — same as the Mac app and the web playground.</p>' +
        '<div class="token-box">' +
          '<input id="tok" type="text" readonly value="' + escapeHtml(token) + '">' +
          '<button type="button" id="copy">Copy</button>' +
        '</div>' +
        '<div class="actions-row">' +
          '<button type="button" class="danger" id="rotate">Rotate token</button>' +
        '</div>' +
      '</div>' +
      '<div class="cli-card">' +
        '<h2>Set it up</h2>' +
        '<p>One command — the CLI stores it in your macOS Keychain (or a chmod-600 file on Linux).</p>' +
        '<div class="cli-snippet">$ lingcode auth login --provider lingmodel\n' +
          '<span class="comment"># paste the token above when prompted</span>\n' +
          '\n' +
          '$ lingcode ask --provider lingmodel "build me a pitch deck"\n' +
          '$ lingcode ask --provider lingmodel --model lingmodel-advanced "..."</div>' +
        '<p style="margin-top:14px">Without the <code>--model</code> flag, requests use LingModel Standard. Use <code>--model lingmodel-advanced</code> for LingModel Advanced (<code>lingmodel-pro</code> remains accepted). Tier limits apply.</p>' +
      '</div>' +
      '<div class="cli-card">' +
        '<h2>Security</h2>' +
        '<p>This token grants API-level access to your LingCode account. Don’t paste it into shared code or commit it to a repo. Click <strong>Rotate token</strong> if it leaks — the old token stops working immediately.</p>' +
      '</div>' +
      '<div class="cli-card">' +
        '<h2>Web Control (different token)</h2>' +
        '<p>Want to drive your local agent from a browser? <a href="/control.html">Open Web Control</a>. It uses the bearer at <code>~/.lingcode/server.token</code> on the machine running <code>lingcode serve</code> — separate from the LingModel token above.</p>' +
      '</div>';

    var input = document.getElementById('tok');
    var copyBtn = document.getElementById('copy');
    if (copyBtn && input) {
      copyBtn.addEventListener('click', function () {
        input.select();
        try { navigator.clipboard.writeText(input.value); } catch (_) { document.execCommand('copy'); }
        var orig = copyBtn.textContent;
        copyBtn.classList.add('copied');
        copyBtn.textContent = '✓ Copied';
        setTimeout(function () { copyBtn.classList.remove('copied'); copyBtn.textContent = orig; }, 1400);
      });
    }
    var rotateBtn = document.getElementById('rotate');
    if (rotateBtn) {
      rotateBtn.addEventListener('click', function () {
        if (!window.confirm('Rotate token? The old one stops working immediately and any CLI sessions using it will need to re-authenticate.')) return;
        rotateBtn.disabled = true;
        rotateBtn.textContent = 'Rotating…';
        fetch('/api/account/cli-token', { method: 'DELETE', credentials: 'same-origin' })
          .then(function (r) { return r.json(); })
          .then(function (j) {
            if (j && j.ok && j.token) {
              render(j.token);
            } else {
              alert('Could not rotate token.');
              rotateBtn.disabled = false;
              rotateBtn.textContent = 'Rotate token';
            }
          })
          .catch(function () {
            alert('Could not rotate token.');
            rotateBtn.disabled = false;
            rotateBtn.textContent = 'Rotate token';
          });
      });
    }
  }

  // Mint or fetch the token. POST is idempotent — server returns the
  // existing token if one's present, otherwise creates a new one.
  fetch('/api/account/cli-token', { method: 'POST', credentials: 'same-origin' })
    .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
    .then(function (x) {
      if (!x.ok || !x.j || !x.j.ok || !x.j.token) {
        showGuest();
        return;
      }
      if (isDeviceFlow) {
        deliverToCLI(x.j.token);
      } else {
        render(x.j.token);
      }
    })
    .catch(function () { showGuest(); });
})();
  </script>
