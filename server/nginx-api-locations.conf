# Paste inside: server { ... } for lingcode.dev
# Or: sudo cp nginx-api-locations.conf /etc/nginx/snippets/lingcode-api.conf
# Then add one line inside that server block:
#   include /etc/nginx/snippets/lingcode-api.conf;
# Then: sudo nginx -t && sudo systemctl reload nginx

location /api/ {
    # Vision prompts ship base64-encoded images; nginx default 1m would
    # 413 anything past one ~700KB image. Express on the inference route
    # already allows 50mb; align nginx to the same ceiling.
    # `proxy_request_buffering` (REQUEST body) stays on — turning it off
    # was dropping connections mid-upload for large bodies.
    # `proxy_buffering` (RESPONSE body) is also left on globally; the
    # streaming inference route (/api/inference/anthropic) opts out
    # per-response via the `X-Accel-Buffering: no` header it sets
    # itself, which nginx honors without breaking non-streaming JSON
    # responses.
    client_max_body_size 32m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://127.0.0.1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /oauth/ {
    proxy_pass http://127.0.0.1:3000/oauth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /auth/ {
    proxy_pass http://127.0.0.1:3000/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /p/<id> — public short-link redirect for shared prototypes.
# 302s to /try.html#<key>=<base64-payload> via the Node API.
location /p/ {
    proxy_pass http://127.0.0.1:3000/p/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /r/<code> — marketer referral link (referrals.js). Logs a click, sets the
# lc_ref cookie, then 302s to the DMG download. Must be proxied (not served as a
# static file) so the click is recorded + the cookie set.
location /r/ {
    proxy_pass http://127.0.0.1:3000/r/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /apps/<uuid>/ — serves deployed "LingCode Cloud" apps from the Node app
# (cloud-apps.js serving route). MUST be proxied, not served as static files,
# or the deploy link 404s against /var/www/html. ^~ stops the \.html$ / ^/admin
# regex locations from stealing /apps/*.html sub-pages. Bare proxy_pass (no
# path) preserves the full /apps/... URI; Node handles the no-slash 301 itself.
location ^~ /apps/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /ws/ — WebSocket upgrade for /try collaborative editing.
# Real-time Yjs sync over /ws/collab/:prototypeId. The 24h read/send
# timeout keeps idle WS connections alive (y-websocket pings every 30s).
location /ws/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
