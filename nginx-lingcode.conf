# Production nginx config for lingcode.dev — the source of truth.
#
# Deploy with:
#   scp website/nginx-lingcode.conf root@45.55.39.39:/etc/nginx/sites-available/lingcode.dev
#   ssh root@45.55.39.39 'nginx -t && systemctl reload nginx'
#
# TLS cert is managed by certbot (renewed via systemd timer). The cert at
# /etc/letsencrypt/live/lingcode.dev/ has both `lingcode.dev` and
# `www.lingcode.dev` as SANs — required for the 301 on www to present a
# valid cert before redirecting.
#
# ─── Canonicalization model ──────────────────────────────────────────────────
# Apex (lingcode.dev) is canonical. `www.*` and `http://*` 301 to apex in one hop.
# Before this split, the single 443 block served `server_name lingcode.dev www.*`
# with identical content, which caused Search Console to file every www URL as
# "Alternate page with canonical tag" (wasting crawl budget) even though the
# <link rel="canonical"> tag was correct.
# ─────────────────────────────────────────────────────────────────────────────

# HTTPS apex — serves the site
server {
    server_name lingcode.dev;
    root /var/www/html;
    index index.html;
    include /etc/nginx/snippets/lingcode-api.conf;

    # Consolidate stale /docs/* paths that Googlebot discovered in March to their
    # current canonical URLs. Keeps /docs/terms.html as-is (no canonical moved yet).
    location = /docs/privacy.html { return 301 /privacy.html; }
    location = /docs/support.html { return 301 /support.html; }

    # Clean URLs for key marketing pages.
    location = /pitch { return 301 /pitch.html; }
    location = /cloud { return 301 /cloud.html; }

    # Admin pages — stricter than the global `no-cache` below. The admin
    # dashboard ships its JS inline in the HTML, and a stale browser cache
    # of admin-dashboard.html locks the user out of bug fixes to that JS
    # until they manually clear cache (happened in practice: admin saw
    # "Loading…" forever after a deploy because the cached HTML referenced
    # the old endpoint shape). `no-store` forbids the browser from writing
    # the response to disk OR memory cache — every visit fetches afresh.
    # `must-revalidate` forbids serving a stale response if revalidation
    # fails for any reason. Listed BEFORE the generic `\.html$` location
    # so nginx's regex-order evaluation picks this one first for /admin-*.
    location ~* ^/admin(?:-|\.|/) {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ =404;
    }

    # HTML must revalidate every visit. Without this, browsers heuristically
    # cache HTML for hours, so a deploy doesn't reach users until they
    # manually hard-refresh. JS / CSS / fonts are still cached aggressively
    # because the entry-point script tag carries a ?v= cache-bust.
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ =404; }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lingcode.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lingcode.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTPS www → apex (301)
server {
    server_name www.lingcode.dev;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/lingcode.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lingcode.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://lingcode.dev$request_uri;
}

# HTTP (both hosts) → HTTPS apex
server {
    listen 80;
    listen [::]:80;
    server_name lingcode.dev www.lingcode.dev;
    return 301 https://lingcode.dev$request_uri;
}
