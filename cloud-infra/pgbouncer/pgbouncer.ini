; pgbouncer.ini — connection pooler in front of the LingCode Cloud Postgres.
;
; Topology:  Node (small pg.Pool per process) -> PgBouncer :6432 -> Postgres :5432
;
; WHY transaction mode is safe here: every tenant query path in
; cloud-data-plane.js (_asTenant / _asAdminSchema / provision / migrate) wraps
; work in BEGIN ... SET LOCAL ROLE ... SET LOCAL search_path ...
; set_config(..., true) ... COMMIT. All session state is transaction-local and
; auto-resets at COMMIT, and node-postgres uses unnamed (protocol-level)
; prepared statements. There is no plain SET, no named prepared statement, no
; session advisory lock, and no LISTEN/NOTIFY on the hot path (realtime is an
; in-process EventEmitter). So a server connection is safe to recycle at every
; COMMIT. If a session-pinned path is ever added, give it a dedicated
; pool_mode=session database entry here rather than changing the default.

[databases]
; One logical DB. The control plane connects as cloud_admin and SET LOCAL ROLEs
; into the per-tenant role per request. host=postgres resolves on the compose
; network; override via the compose service if the layout changes.
lingcloud = host=postgres port=5432 dbname=lingcloud

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

pool_mode = transaction

; Client-facing capacity vs. server-side fan-in. max_client_conn is how many
; app connections PgBouncer accepts; default_pool_size is how many real Postgres
; backends it opens per (user,db). Keep the latter well under Postgres
; max_connections (default 100) so admin/replication/backup conns stay free.
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; A client that can't get a server connection within this many seconds is
; dropped rather than hanging forever.
query_wait_timeout = 30

; Recycle idle server backends so a traffic lull releases Postgres slots.
server_idle_timeout = 300
server_lifetime = 3600

; node-postgres sends extra_float_digits in its startup packet; PgBouncer must
; be told to ignore startup params it doesn't pool on, or the connection fails.
ignore_startup_parameters = extra_float_digits

; Auth: a single upstream user (cloud_admin). userlist.txt holds its
; SCRAM-SHA-256 verifier (generate it from the real password — see
; pgbouncer/README in cloud-infra). The file is mounted read-only and is NOT
; committed with real credentials.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Admin/stats console (SHOW POOLS;, SHOW STATS;) — restricted to this user.
admin_users = cloud_admin
stats_users = cloud_admin

; Keep TLS termination at PgBouncer optional here because the hop to Postgres
; stays inside the private VPC / compose network. Add server_tls_sslmode=verify-full
; if Postgres is ever reachable off-host.

logfile =
pidfile = /tmp/pgbouncer.pid
