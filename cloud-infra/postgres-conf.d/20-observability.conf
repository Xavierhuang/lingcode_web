# 20-observability.conf — query visibility for the LingCode Cloud Postgres (REFERENCE).
#
# REFERENCE ONLY: applied as explicit `-c` flags in docker-compose.prod.yml, not
# by loading this file (`include_dir` isn't settable via `postgres -c`). Keep in
# sync with the prod-overlay command.
# shared_preload_libraries is read ONLY at startup, so this — like
# archive_mode=on in 10-archive.conf — takes effect on a Postgres RESTART. Do
# both in one maintenance window.
#
# After the restart, create the extension once (obs-setup-db.sh):
#   CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

shared_preload_libraries = 'pg_stat_statements'

# Track the top normalized statements (not every nested statement).
pg_stat_statements.track = top
pg_stat_statements.max = 5000

# Per-statement I/O timing feeds cache-hit / read-time stats the dashboards use.
track_io_timing = on

# Slow-query log: anything over 1s lands in the Postgres log with its duration.
# Tune to taste; 0 would log everything (don't).
log_min_duration_statement = 1000
log_line_prefix = '%m [%p] %u@%d '
