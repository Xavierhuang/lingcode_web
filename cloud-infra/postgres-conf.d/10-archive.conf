# 10-archive.conf — WAL archiving for pgBackRest PITR (REFERENCE).
#
# REFERENCE ONLY: these are the canonical values + rationale. They are applied
# to Postgres as explicit `-c` flags in docker-compose.prod.yml — NOT by loading
# this file. (`include_dir` is only valid inside postgresql.conf, not settable
# via `postgres -c`, so we pass each setting directly.) Keep this file in sync
# with the prod-overlay command if you change a value.
#
# NOTE: archive_mode is NOT reloadable — it takes effect only on a Postgres
# RESTART. Changing archive_command alone is reload-able.

# replica is the PG16 default already, but pin it so a base-image change can't
# silently drop us below the level WAL archiving requires.
wal_level = replica

archive_mode = on
archive_command = 'pgbackrest --stanza=lingcloud archive-push %p'

# Bound how long an idle database can go without shipping a WAL segment, so PITR
# can always recover to within ~a minute of "now" even with no writes.
archive_timeout = 60s

# Headroom for pgBackRest's backup-from + any future streaming standby.
max_wal_senders = 3

# Don't let a transient archive failure wedge the server: if archiving falls
# this far behind, Postgres keeps running and pgBackRest catches up. (Tune up if
# write volume is high.)
# max_slot_wal_keep_size = 10GB

# HA safety valve: bound how much WAL a replication slot may pin. If a standby
# disconnects (or a slot is created but never consumed), Postgres invalidates
# the slot once retained WAL exceeds this, instead of filling the disk — the
# 2026-05-25 disk-pressure failure mode. Re-seed the standby if its slot is
# invalidated. Tune to the VM's free space and expected standby downtime.
max_slot_wal_keep_size = 10GB
