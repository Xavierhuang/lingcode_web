<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backends — LingCode Cloud</title>
  <meta name="robots" content="noindex" />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"></noscript>
  <link rel="stylesheet" href="/style.css?v=20260531a" />
  <style>
    :root {
      --c-bg: #f6f7f9; --c-panel: #ffffff; --c-panel-2: #f4f5f8;
      --c-border: #ecedf1; --c-border-2: #e0e2e8;
      --c-text: #15171c; --c-muted: #5f6470; --c-faint: #9aa0ab;
      --c-accent: #5b5bf6; --c-accent-soft: #eef0fe;
      --c-live: #11885a; --c-danger: #e5484d;
      /* refined-light refresh (2026-06): layered card/tile shadow */
      --c-shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.05);
    }
    /* The site-nav is position:fixed, so clear it (marketing pages do this per-
       page). Without this the sidebar + headings sit hidden under the nav. */
    body { background: var(--c-bg) !important; background-image: none !important; padding-top: 64px; }
    .cx { display: flex; min-height: calc(100vh - 64px); font-family: 'Geist', system-ui, sans-serif; color: var(--c-text); }
    /* ── sidebar ── */
    .cx-side { width: 244px; flex-shrink: 0; border-right: 1px solid var(--c-border); background: #fbfbfd; display: flex; flex-direction: column; }
    .cx-switch { padding: 14px 14px 10px; border-bottom: 1px solid var(--c-border); }
    .cx-switch-btn { width: 100%; text-align: left; background: var(--c-panel); border: 1px solid var(--c-border-2); border-radius: 10px; padding: 10px 12px; cursor: pointer; font-family: inherit; color: var(--c-text); display: flex; align-items: center; gap: 8px; box-shadow: 0 1px 1px rgba(16,24,40,.03); }
    .cx-switch-btn:hover { border-color: var(--c-border-2); }
    .cx-switch-btn .nm { font-weight: 600; font-size: .86rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cx-switch-btn .ar { color: var(--c-faint); font-size: .7rem; }
    .cx-switch-menu { margin-top: 6px; border: 1px solid var(--c-border); border-radius: 9px; overflow: hidden; }
    .cx-switch-menu button { display: block; width: 100%; text-align: left; background: var(--c-panel); border: 0; border-bottom: 1px solid var(--c-border); padding: 8px 11px; cursor: pointer; font-family: inherit; font-size: .82rem; color: var(--c-text); }
    .cx-switch-menu button:last-child { border-bottom: 0; }
    .cx-switch-menu button:hover { background: var(--c-panel-2); }
    .cx-switch-menu button.on { color: var(--c-accent); font-weight: 600; }
    .cx-nav { padding: 10px; }
    .cx-nav-item { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; background: transparent; border: 0; border-radius: 9px; padding: 8px 10px; margin-bottom: 1px; cursor: pointer; font-family: inherit; font-size: .86rem; font-weight: 500; color: var(--c-muted); }
    .cx-nav-item:hover { background: var(--c-panel-2); color: var(--c-text); }
    .cx-nav-item.on { background: var(--c-accent-soft); color: var(--c-accent); font-weight: 600; box-shadow: inset 0 0 0 1px #e2e3fb; }
    .cx-nav-item .ic { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 7px; background: var(--c-panel-2); font-size: .78rem; }
    .cx-nav-item.on .ic { background: var(--c-accent); color: #fff; }
    .cx-sub { padding: 4px 8px 16px; }
    .cx-sub-label { font-size: .66rem; text-transform: uppercase; letter-spacing: .08em; color: var(--c-faint); padding: 8px 10px 4px; }
    .cx-table-btn { display: flex; align-items: center; gap: 7px; width: 100%; text-align: left; background: transparent; border: 0; border-radius: 7px; padding: 6px 10px; cursor: pointer; font-family: 'Geist Mono', monospace; font-size: .76rem; color: var(--c-muted); }
    .cx-table-btn:hover { background: var(--c-panel-2); color: var(--c-text); }
    .cx-table-btn.on { background: var(--c-accent-soft); color: var(--c-accent); }
    /* ── main ── */
    .cx-main { flex: 1; min-width: 0; padding: 22px 26px 70px; overflow: auto; }
    .cx-h { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .cx-h h1 { font-size: 1.4rem; font-weight: 650; letter-spacing: -.025em; margin: 0; flex: 1; }
    .cx-pill { font-size: .64rem; padding: 2px 8px; border-radius: 99px; vertical-align: middle; }
    .cx-pill.live { background: #e9f9f0; color: var(--c-live); box-shadow: inset 0 0 0 1px #c8eed8; font-weight: 600; }
    .cx-pill.other { background: #eee; color: #888; }
    .btn2 { background: var(--c-panel); border: 1px solid var(--c-border-2); color: var(--c-text); border-radius: 9px; padding: 6px 12px; font-size: .8rem; font-weight: 500; cursor: pointer; font-family: inherit; box-shadow: 0 1px 1px rgba(16,24,40,.03); transition: background .12s, border-color .12s; }
    .btn2:hover { background: var(--c-panel-2); border-color: var(--c-border-2); }
    .btn2.primary { background: var(--c-accent); border-color: var(--c-accent); color: #fff; box-shadow: 0 1px 3px rgba(91,91,246,.38); }
    .btn2.primary:hover { filter: brightness(1.06); }
    .btn2.danger { color: var(--c-danger); border-color: #f3c9ca; }
    .btn2.sm { padding: 3px 9px; font-size: .72rem; }
    .card { background: var(--c-panel); border: 1px solid var(--c-border); border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; box-shadow: var(--c-shadow); }
    .card h2 { font-size: .9rem; font-weight: 650; letter-spacing: -.01em; margin: 0 0 12px; }
    .kv { display: flex; gap: 10px; align-items: center; font-size: .82rem; margin: 7px 0; flex-wrap: wrap; }
    .kv .k { color: var(--c-muted); min-width: 96px; }
    .kv code, code.mono { background: var(--c-panel-2); padding: 3px 8px; border-radius: 6px; font-family: 'Geist Mono', monospace; font-size: .76rem; word-break: break-all; max-width: 100%; }
    .muted { color: var(--c-muted); font-size: .85rem; line-height: 1.6; }
    .faint { color: var(--c-faint); font-size: .78rem; }
    /* grid */
    .grid-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .grid-search { flex: 1; min-width: 160px; background: var(--c-panel); border: 1px solid var(--c-border-2); border-radius: 8px; padding: 6px 11px; font-family: inherit; font-size: .8rem; color: var(--c-text); }
    .fld { background: var(--c-panel-2); border: 1px solid var(--c-border-2); border-radius: 8px; padding: 7px 10px; font-family: inherit; font-size: .8rem; color: var(--c-text); }
    .grid-wrap { overflow-x: auto; border: 1px solid var(--c-border); border-radius: 12px; background: var(--c-panel); box-shadow: var(--c-shadow); }
    table.grid { border-collapse: collapse; width: 100%; font-size: .78rem; }
    table.grid th, table.grid td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--c-border); white-space: nowrap; }
    table.grid th { color: var(--c-muted); font-weight: 600; font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; background: #fafbfc; position: sticky; top: 0; cursor: pointer; user-select: none; }
    table.grid th:hover { color: var(--c-text); }
    table.grid td { font-family: 'Geist Mono', monospace; max-width: 360px; overflow: hidden; text-overflow: ellipsis; }
    table.grid tr:hover td { background: #f7f8ff; }
    .grid-actions { text-align: right; white-space: nowrap; }
    textarea.sql { width: 100%; font-family: 'Geist Mono', monospace; font-size: .8rem; background: var(--c-panel); color: var(--c-text); border: 1px solid var(--c-border-2); border-radius: 9px; padding: 12px; min-height: 120px; resize: vertical; }
    .empty { text-align: center; padding: 48px 0; color: var(--c-muted); }
    /* modal */
    .ov { position: fixed; inset: 0; background: rgba(20,20,30,.45); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--c-panel); border: 1px solid var(--c-border); border-radius: 14px; max-width: 480px; width: 100%; padding: 22px 24px; max-height: 86vh; overflow: auto; }
.modal.wide { max-width: 880px; }
    .modal h3 { margin: 0 0 14px; font-size: 1rem; }
    .modal label { display: block; margin: 9px 0; font-size: .76rem; color: var(--c-muted); }
    .modal input { display: block; width: 100%; margin-top: 4px; background: var(--c-panel-2); border: 1px solid var(--c-border-2); border-radius: 7px; padding: 7px 10px; font-family: 'Geist Mono', monospace; font-size: .8rem; color: var(--c-text); box-sizing: border-box; }
    .modal textarea { display: block; width: 100%; margin-top: 4px; background: var(--c-panel-2); border: 1px solid var(--c-border-2); border-radius: 7px; padding: 7px 10px; font-family: 'Geist Mono', monospace; font-size: .8rem; color: var(--c-text); box-sizing: border-box; resize: vertical; min-height: 64px; }
    .modal select { display: block; width: 100%; margin-top: 4px; background: var(--c-panel-2); border: 1px solid var(--c-border-2); border-radius: 7px; padding: 7px 10px; font-family: inherit; font-size: .8rem; color: var(--c-text); box-sizing: border-box; }
    .modal label.inline { display: flex; align-items: center; gap: 7px; }
    .modal label.inline input { width: auto; margin: 0; }
    /* ── overview stat tiles ── */
    .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 16px; }
    .tile { background: var(--c-panel); border: 1px solid var(--c-border); border-radius: 14px; padding: 16px 18px; box-shadow: var(--c-shadow); transition: box-shadow .15s, transform .15s; }
    .tile:hover { box-shadow: 0 6px 18px rgba(16,24,40,.09); transform: translateY(-1px); }
    .tile .n { font-size: 1.7rem; font-weight: 680; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
    .tile .l { font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; color: var(--c-faint); margin-top: 6px; }
    /* ── logs ── */
    .lvl { font-family: 'Geist Mono', monospace; font-size: .66rem; text-transform: uppercase; padding: 1px 7px; border-radius: 5px; }
    .lvl.info { background: var(--c-panel-2); color: var(--c-muted); }
    .lvl.error { background: #fdecec; color: var(--c-danger); }
    .lvl.warn { background: #fff4e0; color: #b7791f; }
    /* ── storage thumbnails ── */
    .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; border: 1px solid var(--c-border); background: var(--c-panel-2); }
    .thumb-ph { width: 40px; height: 40px; border-radius: 6px; border: 1px solid var(--c-border); background: var(--c-panel-2); display: inline-flex; align-items: center; justify-content: center; color: var(--c-faint); font-size: .9rem; }
    /* ── usage chart ── */
    .chart { width: 100%; height: 160px; display: block; }
    .chart .axis { stroke: var(--c-border); stroke-width: 1; }
    /* ── toast ── */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 9500; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--c-text); color: #fff; padding: 10px 14px; border-radius: 9px; font-size: .8rem; box-shadow: 0 6px 24px rgba(0,0,0,.2); animation: toast-in .18s ease; max-width: 320px; }
    .toast.err { background: var(--c-danger); }
    .toast.ok { background: var(--c-live); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    /* ── skeleton ── */
    .sk { background: linear-gradient(90deg, var(--c-panel-2) 25%, #ececf4 37%, var(--c-panel-2) 63%); background-size: 400% 100%; animation: sk 1.2s ease infinite; border-radius: 7px; height: 14px; margin: 8px 0; }
    @keyframes sk { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    /* ── segmented / misc ── */
    .seg { display: inline-flex; align-items: center; gap: 6px; }
    .hamburger { display: none; }
    @media (max-width: 760px) {
      .cx-side { display: none; position: fixed; top: 64px; left: 0; bottom: 0; z-index: 50; box-shadow: 4px 0 20px rgba(0,0,0,.12); }
      .cx-side.open { display: flex; }
      .cx-main { padding: 16px; }
      .hamburger { display: inline-flex; }
      .tiles { grid-template-columns: repeat(2, 1fr); }
    }
  </style>

  <div id="root"><div class="empty">Loading…</div></div>

  <script>
  (function () {
    var root = document.getElementById('root');
    var S = { backends: [], active: null, view: 'overview', tables: [], table: null,
              cols: [], rows: [], pk: [], colMeta: [], total: 0, order: null, dir: 'asc', offset: 0, limit: 50, q: '',
              switchOpen: false, sideOpen: false, live: false, es: null };

    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
    function toast(msg, kind) {
      var w = document.getElementById('toast-wrap'); if (!w) return;
      var t = document.createElement('div'); t.className = 'toast' + (kind ? ' ' + kind : ''); t.textContent = msg;
      w.appendChild(t); setTimeout(function () { t.style.opacity = '0'; setTimeout(function () { t.remove(); }, 250); }, kind === 'err' ? 4200 : 2600);
    }
    function skel(n) { var s = ''; for (var i = 0; i < (n || 4); i++) s += '<div class="sk" style="width:' + (60 + (i * 37) % 40) + '%"></div>'; return '<div class="card">' + s + '</div>'; }
    function fmtBytes(b) { b = Number(b) || 0; if (b < 1024) return b + ' B'; if (b < 1048576) return (b / 1024).toFixed(1) + ' KB'; if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB'; return (b / 1073741824).toFixed(2) + ' GB'; }
    function fileToB64(file) { return new Promise(function (resolve, reject) { var r = new FileReader(); r.onload = function () { resolve(String(r.result).split(',')[1] || ''); }; r.onerror = reject; r.readAsDataURL(file); }); }
    function csvCell(v) { var s = (v === null || v === undefined) ? '' : (typeof v === 'object' ? JSON.stringify(v) : String(v)); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }
    function downloadCSV(name, cols, rows) {
      var lines = [cols.map(csvCell).join(',')].concat(rows.map(function (row) { return cols.map(function (c) { return csvCell(row[c]); }).join(','); }));
      var blob = new Blob([lines.join('\n')], { type: 'text/csv' });
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name + '.csv'; a.click(); setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
    }
    // Export the WHOLE table (not just the visible page) by walking pages of 200,
    // capped at 50k rows so a giant table can't hang the browser.
    function exportTableCSV() {
      var table = S.table, cap = 50000, all = [], cols = S.cols.slice();
      toast('Exporting ' + table + '…');
      var fetchPage = function (offset) {
        return api(base() + '/tables/' + encodeURIComponent(table) + '/rows?limit=200&offset=' + offset).then(function (r) {
          if (S.table !== table) return; // user navigated away
          var d = (r.j && r.j.data) || {}, rows = d.rows || [];
          if (!cols.length && rows[0]) cols = Object.keys(rows[0]);
          all = all.concat(rows);
          if (rows.length === 200 && all.length < cap) return fetchPage(offset + 200);
          downloadCSV(table, cols, all);
          toast('Exported ' + all.length + ' row' + (all.length === 1 ? '' : 's') + (all.length >= cap ? ' (capped)' : ''), 'ok');
        });
      };
      fetchPage(0).catch(function () { toast('Export failed', 'err'); });
    }
    function api(path, opts) {
      return fetch(path, Object.assign({ credentials: 'include', cache: 'no-store' }, opts || {})).then(function (r) {
        return r.json().then(function (j) { return { ok: r.ok && j && j.ok !== false, status: r.status, j: j }; }).catch(function () { return { ok: false, status: r.status, j: null }; });
      });
    }
    function apiW(p, m, b) { return api(p, { method: m, headers: { 'content-type': 'application/json' }, body: b ? JSON.stringify(b) : undefined }); }
    function fmtDate(s) { try { return new Date(s).toLocaleString(); } catch (e) { return s || ''; } }
    function beName(b) { return (b && b.label && String(b.label).trim()) ? String(b.label).trim() : (b.project_key || b.backend_id || '').replace(/^proj_/, '').slice(0, 12); }
    function cur() { return S.backends.filter(function (b) { return b.backend_id === S.active; })[0]; }
    function base() { return '/api/cloud/account/backends/' + encodeURIComponent(S.active); }
    function cellText(v) { if (v === null || v === undefined) return ''; if (typeof v === 'object') return JSON.stringify(v); return String(v); }

    // ── boot ──
    function load() {
      api('/api/cloud/account/backends').then(function (r) {
        if (r.status === 401) return signedOut();
        if (!r.ok) { root.innerHTML = '<div class="empty">Couldn’t load backends.</div>'; return; }
        S.backends = (r.j && r.j.data) || [];
        if (!S.backends.length) return emptyState();
        // Deep-link: ?backend=<id> (e.g. from the project control panel's
        // "Open console") auto-selects that backend if the user can see it.
        if (!S.active) {
          var wanted = new URLSearchParams(location.search).get('backend');
          if (wanted && S.backends.some(function (b) { return b.backend_id === wanted; })) S.active = wanted;
        }
        if (!S.active || !cur()) S.active = S.backends[0].backend_id;
        renderShell(); loadTables();
      });
    }
    function signedOut() { root.innerHTML = '<div class="empty"><p class="muted">Sign in to manage your backends.</p><p style="margin-top:12px"><a class="btn btn-primary" href="/signin.html?next=/backends.html">Sign in</a></p></div>'; }
    function emptyState() {
      root.innerHTML = '<div class="empty"><h2>No backends yet</h2><p class="muted" style="max-width:520px;margin:10px auto 0">In the LingCode IDE: <b>Account → LingCode Cloud → Connect Backend to This Project</b>, then ask the agent to build something that needs data or accounts — a managed Postgres backend appears here automatically.</p></div>';
    }

    // ── shell (sidebar + main) ──
    function renderShell() {
      var b = cur();
      var navItems = [['overview', '⌂', 'Overview'], ['database', '▤', 'Database'], ['storage', '▣', 'Storage'], ['functions', 'ƒ', 'Functions'], ['push', '◔', 'Push'], ['telemetry', '∿', 'Telemetry'], ['experiments', '⚗', 'Experiments'], ['logs', '☰', 'Logs'], ['auth', '◉', 'Authentication'], ['sql', '⌘', 'SQL'], ['settings', '⚙', 'Settings']];
      var sw = '<div class="cx-switch"><button class="cx-switch-btn" id="sw-btn"><span class="nm">' + esc(beName(b)) + '</span><span class="ar">▾</span></button>'
        + (S.switchOpen ? '<div class="cx-switch-menu">' + S.backends.map(function (x) {
            return '<button data-be="' + esc(x.backend_id) + '" class="' + (x.backend_id === S.active ? 'on' : '') + '">' + esc(beName(x)) + '</button>';
          }).join('') + '</div>' : '') + '</div>';
      var nav = '<div class="cx-nav">' + navItems.map(function (it) {
        return '<button class="cx-nav-item ' + (S.view === it[0] ? 'on' : '') + '" data-view="' + it[0] + '"><span class="ic">' + it[1] + '</span>' + it[2] + '</button>';
      }).join('') + '</div>';
      var sub = '';
      if (S.view === 'database') {
        sub = '<div class="cx-sub"><div class="cx-sub-label">Tables</div>'
          + (S.tables.length ? S.tables.map(function (t) {
              return '<button class="cx-table-btn ' + (S.table === t ? 'on' : '') + '" data-table="' + esc(t) + '"><span>▦</span>' + esc(t) + '</button>';
            }).join('') : '<p class="faint" style="padding:6px 10px">No tables yet.</p>') + '</div>';
      }
      root.innerHTML = '<div class="cx"><aside class="cx-side' + (S.sideOpen ? ' open' : '') + '">' + sw + nav + sub + '</aside><main class="cx-main">'
        + '<button class="btn2 sm hamburger" id="cx-burger" style="margin-bottom:12px">☰ Menu</button><div id="cx-main"></div></main></div>';

      document.getElementById('sw-btn').onclick = function () { S.switchOpen = !S.switchOpen; renderShell(); };
      document.getElementById('cx-burger').onclick = function () { S.sideOpen = !S.sideOpen; renderShell(); };
      Array.prototype.forEach.call(root.querySelectorAll('[data-be]'), function (el) { el.onclick = function () { stopLive(); S.active = el.getAttribute('data-be'); S.switchOpen = false; S.table = null; S.view = 'overview'; S.sideOpen = false; renderShell(); loadTables(); }; });
      Array.prototype.forEach.call(root.querySelectorAll('[data-view]'), function (el) { el.onclick = function () { stopLive(); S.view = el.getAttribute('data-view'); S.sideOpen = false; renderShell(); }; });
      Array.prototype.forEach.call(root.querySelectorAll('[data-table]'), function (el) { el.onclick = function () { openTable(el.getAttribute('data-table')); }; });
      renderView();
    }

    // TELEMETRY (Analytics / Crashlytics / Performance / Releases)
    function renderTelemetry() {
      var m = main(); var b = cur(); if (!m || !b) return;
      if (!S.telSub) S.telSub = 'analytics';
      var tabs = [['analytics', 'Analytics'], ['active-users', 'Active users'], ['retention', 'Retention'], ['funnel', 'Funnels'], ['engagement', 'Engagement'], ['conversions', 'Conversions'], ['realtime', 'Realtime'], ['crashes', 'Crashlytics'], ['performance', 'Performance'], ['releases', 'Releases']];
      var showSeg = { 'active-users': 1, 'retention': 1, 'funnel': 1, 'engagement': 1 }[S.telSub];

        + (showSeg ? '<select class="btn2 sm" id="tel-seg" style="margin-right:6px"><option>All users</option></select>' : '')
        + '<a class="btn2 sm" href="' + base() + '/telemetry/export?days=30" download style="text-decoration:none;margin-right:6px">Export CSV</a>'
        + '<button class="btn2 sm" id="tel-refresh">Refresh</button></div>'
        + '<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">'
        + tabs.map(function (t) { return '<button class="btn2 sm ' + (S.telSub === t[0] ? 'primary' : '') + '" data-tel="' + t[0] + '">' + t[1] + '</button>'; }).join('')
        + '</div><div id="tel-body">' + skel(2) + '</div>';

        el.onclick = function () { stopRealtime(); S.telSub = el.getAttribute('data-tel'); renderTelemetry(); };
      });
      if (showSeg) populateSegments();
      loadTelemetry();
    }
    function populateSegments() {
      var sel = document.getElementById('tel-seg'); if (!sel) return;
      var build = function (segs) {
        var sel = document.getElementById('tel-seg'); if (!sel) return;
        var opts = '<option value="">All users</option>';
        (segs.versions || []).forEach(function (v) { opts += '<option value="version:' + esc(v) + '">Version = ' + esc(v) + '</option>'; });
        (segs.platforms || []).forEach(function (p) { opts += '<option value="platform:' + esc(p) + '">Platform = ' + esc(p) + '</option>'; });
        (segs.countries || []).forEach(function (c) { opts += '<option value="country:' + esc(c) + '">Country = ' + esc(c) + '</option>'; });
        Object.keys(segs.props || {}).forEach(function (k) { (segs.props[k] || []).forEach(function (v) { opts += '<option value="prop:' + esc(k) + ':' + esc(v) + '">' + esc(k) + ' = ' + esc(v) + '</option>'; }); });
        (segs.events || []).forEach(function (e) { opts += '<option value="event:' + esc(e) + '">Did ' + esc(e) + '</option>'; });
        opts += '<option value="dormant:7">Dormant · 7d+ inactive</option><option value="dormant:14">Dormant · 14d+ inactive</option><option value="dormant:30">Dormant · 30d+ inactive</option>';
        sel.innerHTML = opts;
        sel.value = S.telSeg || '';
        sel.onchange = function () { S.telSeg = sel.value; loadTelemetry(); };
      };
      if (S.telSegments) return build(S.telSegments);
      api(base() + '/telemetry/segments').then(function (r) { S.telSegments = (r.ok && r.j && r.j.data) || {}; build(S.telSegments); });
    }
    function loadTelemetry() {

      var sub = S.telSub;

      api(base() + '/telemetry/' + sub + '?days=30' + segQ).then(function (r) {
        var body = document.getElementById('tel-body'); if (!body) return;

                + top.map(function (e) { return '<tr><td><a href="#" data-evt="' + esc(e.event_name) + '" style="color:var(--c-accent)">' + esc(e.event_name) + '</a></td><td>' + e.total + '</td></tr>'; }).join('') + '</tbody></table></div>'
              : '<p class="muted" style="margin:10px 0 0">No events yet. From your app: <code>lingcode.telemetry.logEvent("signup")</code>.</p>') + '</div>';

              : '<p class="muted" style="margin:10px 0 0">No active users yet — these come from the SDK\'s pseudonymous client id (sent automatically).</p>') + '</div>';
        } else if (sub === 'retention') {
          var cohorts = (d && d.cohorts) || [], offs = (d && d.offsets) || [1, 7, 30];

            + (cohorts.length
              ? '<div class="grid-wrap"><table class="grid"><thead><tr><th>Cohort (first seen)</th><th>New users</th>' + offs.map(function (n) { return '<th>Day ' + n + '</th>'; }).join('') + '</tr></thead><tbody>'
                + cohorts.map(function (c) { return '<tr><td>' + esc(c.cohort) + '</td><td>' + c.size + '</td>' + offs.map(function (n) { return '<td>' + (c.retention[n] || 0) + '%</td>'; }).join('') + '</tr>'; }).join('') + '</tbody></table></div>'
              : '<p class="muted">No cohort data yet.</p>') + '</div>';
        } else if (sub === 'engagement') {
          renderEngagement(body, d);
        } else if (sub === 'conversions') {
          var rows = (d && d.conversions) || [];
          body.innerHTML = '<div class="card"><h2>Conversions</h2><p class="muted" style="margin:0 0 8px">Mark events as conversions to track their rate (distinct converters ÷ active users, 30d).</p>'
            + '<div style="display:flex;gap:6px;margin-bottom:10px"><input class="grid-search" id="conv-name" placeholder="event name e.g. subscribe" style="flex:0 0 260px"/><button class="btn2 sm primary" id="conv-add">Mark as conversion</button></div>'
            + (rows.length
              ? '<div class="grid-wrap"><table class="grid"><thead><tr><th>Event</th><th>Converters</th><th>Rate</th><th></th></tr></thead><tbody>'
                + rows.map(function (c) { return '<tr><td>' + esc(c.event_name) + '</td><td>' + c.converters + '</td><td>' + c.rate + '%</td><td><button class="btn2 sm" data-unconv="' + esc(c.event_name) + '">Remove</button></td></tr>'; }).join('') + '</tbody></table></div>'
              : '<p class="muted">No conversions marked yet.</p>') + '</div>';
          document.getElementById('conv-add').onclick = function () {
            var n = (document.getElementById('conv-name').value || '').trim(); if (!n) return;
            apiW(base() + '/telemetry/conversions', 'PUT', { event_name: n, is_key: true }).then(function () { loadTelemetry(); });
          };
          Array.prototype.forEach.call(body.querySelectorAll('[data-unconv]'), function (el) {
            el.onclick = function () { apiW(base() + '/telemetry/conversions', 'PUT', { event_name: el.getAttribute('data-unconv'), is_key: false }).then(function () { loadTelemetry(); }); };
          });
        } else if (sub === 'crashes') {
          var rows = d || [];
          body.innerHTML = '<div class="card"><h2>Crashes</h2>' + (rows.length
            ? '<div class="grid-wrap"><table class="grid"><thead><tr><th>Message</th><th>Version</th><th>Count</th><th>Last seen</th></tr></thead><tbody>'
              + rows.map(function (c) { return '<tr><td title="' + esc(c.message || '') + '" style="max-width:380px">' + esc(c.message || '') + '</td><td>' + esc(c.app_version || '') + '</td><td>' + c.count + '</td><td>' + esc(fmtDate(c.last_seen)) + '</td></tr>'; }).join('') + '</tbody></table></div>'
            : '<p class="muted" style="margin:10px 0 0">No crashes reported. From your app: <code>lingcode.telemetry.recordError(err)</code>.</p>') + '</div>';
        } else if (sub === 'performance') {
          var rows = d || [];
          body.innerHTML = '<div class="card"><h2>Performance traces</h2>' + (rows.length
            ? '<div class="grid-wrap"><table class="grid"><thead><tr><th>Metric</th><th>Count</th><th>Avg (ms)</th><th>Max (ms)</th></tr></thead><tbody>'
              + rows.map(function (p) { return '<tr><td>' + esc(p.metric) + '</td><td>' + p.count + '</td><td>' + p.avg_ms + '</td><td>' + p.max_ms + '</td></tr>'; }).join('') + '</tbody></table></div>'
            : '<p class="muted" style="margin:10px 0 0">No traces yet. From your app: <code>lingcode.telemetry.trace("load", ms)</code>.</p>') + '</div>';
        } else {
          var rows = d || [];
          body.innerHTML = '<div class="card"><h2>Release health (last 30 days)</h2><p class="muted" style="margin:0 0 8px">Events &amp; crashes grouped by the <code>app_version</code> you tag events with.</p>' + (rows.length
            ? '<div class="grid-wrap"><table class="grid"><thead><tr><th>App version</th><th>Events</th><th>Crashes</th></tr></thead><tbody>'
              + rows.map(function (v) { return '<tr><td>' + esc(v.app_version) + '</td><td>' + v.events + '</td><td>' + v.crashes + '</td></tr>'; }).join('') + '</tbody></table></div>'
            : '<p class="muted">No release data yet.</p>') + '</div>';
        }
      });
    }
    function renderEventParams(name) {
      var body = document.getElementById('tel-body'); if (!body) return; body.innerHTML = skel(2);
      api(base() + '/telemetry/events/' + encodeURIComponent(name) + '?days=30').then(function (r) {
        var body = document.getElementById('tel-body'); if (!body) return;
        var d = r.ok && r.j && r.j.data;
        var keys = d ? Object.keys(d.params || {}) : [];
        body.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h2 style="margin:0">' + esc(name) + ' <span class="muted" style="font-weight:400">· ' + ((d && d.total) || 0) + ' events</span></h2><button class="btn2 sm" id="ev-back">← Back</button></div>'
          + (keys.length
            ? keys.map(function (k) { return '<h3 style="margin:14px 0 4px;font-size:.85rem">' + esc(k) + '</h3><div class="grid-wrap"><table class="grid"><thead><tr><th>Value</th><th>Count</th></tr></thead><tbody>' + d.params[k].map(function (v) { return '<tr><td>' + esc(v.value) + '</td><td>' + v.count + '</td></tr>'; }).join('') + '</tbody></table></div>'; }).join('')
            : '<p class="muted" style="margin:10px 0 0">No params logged for this event.</p>') + '</div>';
        document.getElementById('ev-back').onclick = function () { S.telSub = 'analytics'; renderTelemetry(); };
      });

    function renderEngagement(body, d) {
      var series = (d && d.series) || [];
      var mx = series.reduce(function (a, x) { return Math.max(a, x.avg_engagement_sec || 0); }, 1);
      body.innerHTML = '<div class="card"><h2>Engagement (last 30 days)</h2>'
        + '<div class="kv"><span class="k">Engaged sessions (&ge;10s)</span><code class="mono">' + ((d && d.engaged_sessions) || 0) + ' / ' + ((d && d.total_sessions) || 0) + ' (' + ((d && d.engaged_rate) || 0) + '%)</code></div>'
        + (series.length
          ? '<div class="grid-wrap" style="margin-top:10px"><table class="grid"><thead><tr><th>Day</th><th>Avg engagement / user</th><th>Total min</th><th>&nbsp;</th></tr></thead><tbody>'
            + series.map(function (s) { var w = Math.round((s.avg_engagement_sec / mx) * 100); return '<tr><td>' + esc(s.day) + '</td><td>' + s.avg_engagement_sec + 's</td><td>' + s.total_engagement_min + '</td><td style="width:160px"><div style="height:8px;border-radius:4px;background:var(--c-accent);width:' + w + '%"></div></td></tr>'; }).join('') + '</tbody></table></div>'
          : '<p class="muted" style="margin:10px 0 0">No engagement data yet — the SDK emits user_engagement automatically when the page is backgrounded.</p>') + '</div>';

    function stopRealtime() { if (S.rtTimer) { clearInterval(S.rtTimer); S.rtTimer = null; } }

      body.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h2 style="margin:0">Realtime <span class="muted" style="font-weight:400">· last 30 min, live</span></h2><span class="muted" id="rt-active"></span></div><div id="rt-list" style="margin-top:10px"></div></div>';
      var tick = function () {
        if (!document.getElementById('rt-list')) { stopRealtime(); return; }

    function renderFunnelBuilder(body) {
      if (!S.funnelSteps) S.funnelSteps = '';

    // EXPERIMENTS (A/B + Remote Config)
    function renderExperiments() {
      var m = main(); var b = cur(); if (!m || !b) return;
      m.innerHTML = '<div class="cx-h"><h1>Experiments <span class="muted" style="font-weight:400">· A/B + Remote Config</span></h1><button class="btn2 sm primary" id="exp-new">New experiment</button></div>'
        + '<p class="muted" style="margin:0 0 12px">Define a config key with weighted variants. Clients are bucketed deterministically and each gets a sticky <code>exp_&lt;key&gt;</code> user property — so you measure impact via the segment dropdown in Telemetry (compare variants on conversion / retention / funnels). Read values in your app with <code>lingcode.config.get("key")</code>.</p>'
        + '<div id="exp-body">' + skel(2) + '</div>';
      document.getElementById('exp-new').onclick = function () { expEditForm(null); };
      loadExperiments();
    }
    function expValStr(v) { try { return JSON.stringify(v === undefined ? '' : v); } catch (e) { return '""'; } }
    function loadExperiments() {
      var body = document.getElementById('exp-body'); if (!body) return; body.innerHTML = skel(2);
      api(base() + '/experiments').then(function (r) {
        var body = document.getElementById('exp-body'); if (!body) return;
        var rows = (r.ok && r.j && r.j.data) || [];
        if (!rows.length) { body.innerHTML = '<div class="card empty"><p class="muted">No experiments yet. Click “New experiment” to create one.</p></div>'; return; }
        body.innerHTML = rows.map(function (e) {
          var vs = (e.variants || []).map(function (v) { return esc(v.name) + ' (' + v.weight + ') = ' + esc(expValStr(v.value)); }).join(' · ');
          return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><b>' + esc(e.param_key) + '</b> <span class="lvl ' + (e.status === 'running' ? 'info' : 'warn') + '">' + esc(e.status) + '</span></div><div style="display:flex;gap:6px"><button class="btn2 sm" data-edit="' + esc(e.id) + '">Edit</button><button class="btn2 sm" data-del="' + esc(e.id) + '">Delete</button></div></div><p class="muted" style="margin:8px 0 0;font-size:.78rem">' + vs + '</p></div>';
        }).join('');
        Array.prototype.forEach.call(body.querySelectorAll('[data-edit]'), function (el) { el.onclick = function () { var id = el.getAttribute('data-edit'); expEditForm(rows.filter(function (x) { return x.id === id; })[0]); }; });
        Array.prototype.forEach.call(body.querySelectorAll('[data-del]'), function (el) { el.onclick = function () { if (!confirm('Delete this experiment?')) return; api(base() + '/experiments/' + encodeURIComponent(el.getAttribute('data-del')), { method: 'DELETE' }).then(loadExperiments); }; });
      });
    }
    function expVarRow(v) {

      document.getElementById('exp-addvar').onclick = function () { var d = document.createElement('div'); d.innerHTML = expVarRow({ name: '', value: '', weight: 1 }); document.getElementById('exp-vars').appendChild(d.firstChild); };

    // DATABASE
    function renderDatabase() {
      var m = main(); if (!m) return;

      if (!S.tables.length) { m.innerHTML += '<div class="card empty"><p class="muted">No tables yet. Click <b>+ New table</b>, use the <b>SQL</b> tab, or ask the agent to run a migration.</p></div>'; document.getElementById('g-newtable').onclick = newTable; return; }
      if (!S.table) S.table = S.tables[0];
      if (S.table && !S.colMeta.length) loadColumns();
      var hasVec = (S.colMeta || []).some(function (c) { return c.udt === 'vector'; });
      m.innerHTML = '<div class="cx-h"><h1>' + esc(S.table) + '</h1>'
        + '<button class="btn2 sm" id="g-refresh">Refresh</button>'
        + '<button class="btn2 sm" id="g-cols">Edit columns</button>'
        + '<button class="btn2 sm" id="g-schema">Schema</button>'
        + '<button class="btn2 sm" id="g-advisors">Advisors</button>'
        + (hasVec ? '<button class="btn2 sm" id="g-vec">Vector search</button>' : '')
        + '<button class="btn2 sm" id="g-fts">Search</button>'
        + '<button class="btn2 sm" id="g-csv">Export CSV</button>'
        + '<label class="faint seg"><input type="checkbox" id="g-live"' + (S.live ? ' checked' : '') + '/> Live</label>'
        + '<button class="btn2 sm" id="g-newtable">+ New table</button>'
        + '<button class="btn2 sm primary" id="g-add">+ Insert row</button></div>'
        + '<div class="grid-toolbar"><input class="grid-search" id="g-search" placeholder="Filter loaded rows…" value="' + esc(S.q) + '"/>'
        + '<button class="btn2 sm" id="g-prev"' + (S.offset <= 0 ? ' disabled' : '') + '>‹ Prev</button>'
        + '<span class="faint" id="g-range"></span>'
        + '<button class="btn2 sm" id="g-next">Next ›</button></div>'
        + '<div id="g-body"><p class="muted">Loading…</p></div>';
      document.getElementById('g-refresh').onclick = loadRows;
      document.getElementById('g-newtable').onclick = newTable;
      document.getElementById('g-cols').onclick = editColumns;
      document.getElementById('g-schema').onclick = schemaModal;
      document.getElementById('g-advisors').onclick = advisorsModal;
      document.getElementById('g-fts').onclick = searchModal;
      document.getElementById('g-csv').onclick = exportTableCSV;
      document.getElementById('g-add').onclick = function () { editRow(-1); };
      document.getElementById('g-prev').onclick = function () { if (S.offset > 0) { S.offset = Math.max(0, S.offset - S.limit); loadRows(); } };
      document.getElementById('g-next').onclick = function () { if (S.offset + S.limit < S.total) { S.offset += S.limit; loadRows(); } };
      document.getElementById('g-search').oninput = function (e) { S.q = e.target.value; renderRows(); };
      document.getElementById('g-live').onchange = function (e) { if (e.target.checked) startLive(); else stopLive(); };
      if (hasVec) document.getElementById('g-vec').onclick = vectorSearchModal;
      loadRows();
    }
    function openTable(t) { stopLive(); S.table = t; S.view = 'database'; S.offset = 0; S.q = ''; S.order = null; S.colMeta = []; S.colLoading = false; renderShell(); }
    function loadColumns() {
      if (S.colLoading) return; S.colLoading = true;
      var t = S.table;
      api(base() + '/tables/' + encodeURIComponent(t) + '/columns').then(function (r) {
        S.colLoading = false;
        if (S.table !== t) return;
        S.colMeta = (r.ok && r.j && r.j.data) || [];
        // re-render so column types + the vector-search button reflect metadata
        if (S.view === 'database' && S.colMeta.length) renderShell();
      });
    }
    function colType(c) { var m = (S.colMeta || []).filter(function (x) { return x.column === c; })[0]; return m ? m.udt : null; }

    function loadRows() {
      var m = main(); var body = document.getElementById('g-body'); if (body) body.innerHTML = '<p class="muted">Loading…</p>';
      var qs = '?limit=' + S.limit + '&offset=' + S.offset + (S.order ? '&order=' + encodeURIComponent(S.order) + '&dir=' + S.dir : '');
      var t = S.table;
      api(base() + '/tables/' + encodeURIComponent(t) + '/rows' + qs).then(function (r) {
        if (S.table !== t) return;
        var body = document.getElementById('g-body'); if (!body) return;
        if (!r.ok) { body.innerHTML = '<p class="muted">Couldn’t load rows.</p>'; return; }
        var d = (r.j && r.j.data) || {};
        S.rows = d.rows || []; S.cols = d.fields || (S.rows[0] ? Object.keys(S.rows[0]) : []); S.pk = d.primary_key || []; S.total = d.total != null ? d.total : S.rows.length;
        renderRows();
      });
    }
    function visibleRows() {
      if (!S.q) return S.rows;
      var q = S.q.toLowerCase();
      return S.rows.filter(function (row) { return S.cols.some(function (c) { return cellText(row[c]).toLowerCase().indexOf(q) >= 0; }); });
    }
    function renderRows() {
      var body = document.getElementById('g-body'); if (!body) return;
      var rows = visibleRows(), canEdit = S.pk.length > 0;
      var range = document.getElementById('g-range'); if (range) range.textContent = S.rows.length ? (S.offset + 1) + '–' + (S.offset + S.rows.length) + ' of ' + S.total : '0 of ' + S.total;
      var nextBtn = document.getElementById('g-next'); if (nextBtn) nextBtn.disabled = (S.offset + S.limit) >= S.total;
      if (!S.rows.length) { body.innerHTML = '<div class="card empty"><p class="muted">No rows.</p></div>'; return; }
      var head = '<tr>' + S.cols.map(function (c) {
        var arrow = S.order === c ? (S.dir === 'asc' ? ' ↑' : ' ↓') : '';
        var ty = colType(c);
        return '<th data-sort="' + esc(c) + '" title="' + esc(ty || '') + '">' + esc(c) + (S.pk.indexOf(c) >= 0 ? ' 🔑' : '') + (ty ? '<span class="faint" style="font-weight:400"> ' + esc(ty) + '</span>' : '') + arrow + '</th>';
      }).join('') + '<th></th></tr>';
      var trs = rows.map(function (row) {
        var idx = S.rows.indexOf(row);
        var tds = S.cols.map(function (c) { return '<td title="' + esc(cellText(row[c])) + '">' + esc(cellText(row[c])) + '</td>'; }).join('');
        var act = canEdit ? '<td class="grid-actions"><button class="btn2 sm" data-edit="' + idx + '">Edit</button> <button class="btn2 sm" data-del="' + idx + '">Del</button></td>' : '<td></td>';
        return '<tr>' + tds + act + '</tr>';
      }).join('');
      body.innerHTML = '<div class="grid-wrap"><table class="grid"><thead>' + head + '</thead><tbody>' + trs + '</tbody></table></div>'
        + '<p class="faint" style="margin-top:8px">' + rows.length + ' row' + (rows.length === 1 ? '' : 's') + (S.q ? ' (filtered)' : '') + (canEdit ? ' · 🔑 primary key' : ' · no primary key — read-only') + '</p>';
      Array.prototype.forEach.call(body.querySelectorAll('[data-sort]'), function (th) { th.onclick = function () { var c = th.getAttribute('data-sort'); if (S.order === c) S.dir = S.dir === 'asc' ? 'desc' : 'asc'; else { S.order = c; S.dir = 'asc'; } S.offset = 0; loadRows(); }; });
      Array.prototype.forEach.call(body.querySelectorAll('[data-edit]'), function (el) { el.onclick = function () { editRow(Number(el.getAttribute('data-edit'))); }; });
      Array.prototype.forEach.call(body.querySelectorAll('[data-del]'), function (el) { el.onclick = function () { delRow(Number(el.getAttribute('data-del'))); }; });
    }

    // Pick an input widget by column udt type. Returns HTML; the [data-col]
    // element carries data-kind so saving can coerce back to the right JS type.
    function fieldFor(c, raw) {
      var ty = colType(c) || ''; var pk = S.pk.indexOf(c) >= 0;
      var lab = esc(c) + (pk ? ' 🔑' : '') + (ty ? ' <span class="faint">' + esc(ty) + '</span>' : '');
      var isNull = raw === null || raw === undefined;
      var nullBox = '<label class="inline" style="margin-top:2px"><input type="checkbox" data-null="' + esc(c) + '"' + (isNull ? ' checked' : '') + '/> <span class="faint">null</span></label>';
      if (ty === 'bool') return '<label>' + lab + '<select data-col="' + esc(c) + '" data-kind="bool"><option value=""' + (isNull ? ' selected' : '') + '>—</option><option value="true"' + (raw === true ? ' selected' : '') + '>true</option><option value="false"' + (raw === false ? ' selected' : '') + '>false</option></select></label>';
      var kind = 'text', type = 'text';
      if (/^timestamp/.test(ty) || ty === 'date') { kind = 'date'; type = (ty === 'date') ? 'date' : 'datetime-local'; }
      else if (/^(int|float|numeric|double|real|serial|bigint|smallint)/.test(ty)) { kind = 'num'; type = 'number'; }
      if (ty === 'json' || ty === 'jsonb' || ty === 'text') {
        return '<label>' + lab + '<textarea data-col="' + esc(c) + '" data-kind="' + (ty === 'text' ? 'text' : 'json') + '">' + esc(isNull ? '' : cellText(raw)) + '</textarea></label>' + nullBox;
      }
      var val = isNull ? '' : (type === 'datetime-local' ? String(cellText(raw)).replace(' ', 'T').slice(0, 16) : cellText(raw));
      return '<label>' + lab + '<input type="' + type + '" data-col="' + esc(c) + '" data-kind="' + kind + '" value="' + esc(val) + '"/></label>' + nullBox;
    }
    function editRow(i) {
      var row = i >= 0 ? S.rows[i] : {};
      var ov = document.createElement('div'); ov.className = 'ov';
      ov.innerHTML = '<div class="modal"><h3>' + (i >= 0 ? 'Edit row' : 'Insert row') + ' · ' + esc(S.table) + '</h3>'
        + S.cols.map(function (c) { return fieldFor(c, i >= 0 ? row[c] : undefined); }).join('')
        + '<p class="faint" id="m-msg" style="min-height:1em;margin:8px 0 0"></p>'
        + '<div style="text-align:right;margin-top:12px"><button class="btn2" id="m-cancel">Cancel</button> <button class="btn2 primary" id="m-save">Save</button></div></div>';
      document.body.appendChild(ov);
      bindModalKeys(ov);
      ov.addEventListener('click', function (e) { if (e.target === ov) ov.remove(); });
      ov.querySelector('#m-cancel').onclick = function () { ov.remove(); };
      ov.querySelector('#m-save').onclick = function () {
        var msg = ov.querySelector('#m-msg'); msg.textContent = 'Saving…';
        var vals = {};
        S.cols.forEach(function (c) {
          var nb = ov.querySelector('[data-null="' + cssEsc(c) + '"]');
          if (nb && nb.checked) { vals[c] = null; return; }
          var inp = ov.querySelector('[data-col="' + cssEsc(c) + '"]'); if (!inp) return;
          var v = inp.value, kind = inp.getAttribute('data-kind');
          if (v === '') { vals[c] = null; }
          else if (kind === 'bool') { vals[c] = v === 'true'; }
          else if (kind === 'num') { vals[c] = Number(v); }
          else if (kind === 'json') { try { vals[c] = JSON.parse(v); } catch (_) { vals[c] = v; } }
          else { vals[c] = v; }
        });
        var done = function (r) { if (!r.ok) { msg.textContent = (r.j && (r.j.message || r.j.error)) || 'Failed'; toast('Save failed', 'err'); return; } ov.remove(); toast('Saved', 'ok'); loadRows(); };
        var p = base() + '/tables/' + encodeURIComponent(S.table) + '/rows';
        if (i < 0) { apiW(p, 'POST', { row: vals }).then(done); return; }
        var where = {}; S.pk.forEach(function (k) { where[k] = S.rows[i][k]; });
        var patch = {}; S.cols.forEach(function (c) { if (JSON.stringify(vals[c]) !== JSON.stringify(S.rows[i][c] === undefined ? null : S.rows[i][c])) patch[c] = vals[c]; });
        if (!Object.keys(patch).length) { ov.remove(); return; }
        apiW(p, 'PATCH', { where: where, patch: patch }).then(done);
      };
    }
    function cssEsc(s) { return String(s).replace(/["\\]/g, '\\$&'); }
    function delRow(i) {
      if (!S.pk.length || !confirm('Delete this row? This cannot be undone.')) return;
      var where = {}; S.pk.forEach(function (k) { where[k] = S.rows[i][k]; });
      apiW(base() + '/tables/' + encodeURIComponent(S.table) + '/rows', 'DELETE', { where: where }).then(function (r) { if (r.ok) { toast('Row deleted', 'ok'); loadRows(); } else toast((r.j && (r.j.message || r.j.error)) || 'Delete failed', 'err'); });
    }

    // Focus the first field and let Esc close any modal (keyboard polish).
    function bindModalKeys(ov) {
      var first = ov.querySelector('input, textarea, select'); if (first) { try { first.focus(); } catch (_) {} }
      var onKey = function (e) { if (e.key === 'Escape') { ov.remove(); document.removeEventListener('keydown', onKey); } };
      document.addEventListener('keydown', onKey);
      // stop listening once the overlay is gone
      var obs = new MutationObserver(function () { if (!document.body.contains(ov)) { document.removeEventListener('keydown', onKey); obs.disconnect(); } });
      obs.observe(document.body, { childList: true });
    }

    // ── schema editor: new table / edit columns (via migrate route) ──────
    function modal(title, bodyHtml, onSave, saveLabel) {
      var ov = document.createElement('div'); ov.className = 'ov';
      ov.innerHTML = '<div class="modal"><h3>' + esc(title) + '</h3>' + bodyHtml
        + '<p class="faint" id="mm-msg" style="min-height:1em;margin:8px 0 0"></p>'
        + '<div style="text-align:right;margin-top:12px"><button class="btn2" id="mm-cancel">Cancel</button> <button class="btn2 primary" id="mm-save">' + esc(saveLabel || 'Save') + '</button></div></div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', function (e) { if (e.target === ov) ov.remove(); });
      ov.querySelector('#mm-cancel').onclick = function () { ov.remove(); };
      ov.querySelector('#mm-save').onclick = function () { onSave(ov, ov.querySelector('#mm-msg')); };
      bindModalKeys(ov);
      return ov;
    }
    function runMigration(sql, ov, msg, okMsg) {
      msg.textContent = 'Running…';
      apiW(base() + '/sql/migrate', 'POST', { sql: sql }).then(function (r) {
        if (!r.ok) { msg.textContent = (r.j && (r.j.message || r.j.error)) || 'Failed'; return; }
        ov.remove(); toast(okMsg || 'Done', 'ok'); S.colMeta = []; loadTables();
      });
    }
    var PG_TYPES = ['text', 'int', 'bigint', 'numeric', 'boolean', 'uuid', 'timestamptz', 'date', 'jsonb', 'serial', 'vector(1536)'];
    function typeOptions(sel) { return PG_TYPES.map(function (t) { return '<option' + (t === sel ? ' selected' : '') + '>' + t + '</option>'; }).join(''); }
    function newTable() {
      var ov = modal('New table',
        '<label>Table name<input id="nt-name" placeholder="notes"/></label>'
        + '<p class="faint" style="margin:10px 0 4px">Columns (an <code>id</code> primary key is added automatically)</p>'
        + '<div id="nt-cols"></div><button class="btn2 sm" id="nt-add" style="margin-top:6px">+ Column</button>',
        function (ov, msg) {
          var name = (ov.querySelector('#nt-name').value || '').trim();
          if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(name)) { msg.textContent = 'Invalid table name.'; return; }
          var defs = ['id serial primary key'];
          Array.prototype.forEach.call(ov.querySelectorAll('.nt-row'), function (rowEl) {
            var cn = (rowEl.querySelector('[data-cn]').value || '').trim();
            var ct = rowEl.querySelector('[data-ct]').value;
            if (/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(cn)) defs.push('"' + cn + '" ' + ct);
          });
          runMigration('create table "' + name + '" (' + defs.join(', ') + ');', ov, msg, 'Table created');
        }, 'Create table');
      var add = function () {
        var d = document.createElement('div'); d.className = 'nt-row kv'; d.style.margin = '6px 0';
        d.innerHTML = '<input data-cn placeholder="column" style="flex:1"/><select data-ct>' + typeOptions('text') + '</select><button class="btn2 sm" data-rm>✕</button>';
        d.querySelector('[data-rm]').onclick = function () { d.remove(); };
        ov.querySelector('#nt-cols').appendChild(d);
      };
      ov.querySelector('#nt-add').onclick = add; add();
    }
    function editColumns() {
      var rows = (S.colMeta || []).map(function (c) {
        return '<div class="kv" style="margin:5px 0"><code class="mono" style="flex:1">' + esc(c.column) + '</code><span class="faint">' + esc(c.udt) + '</span>'
          + (S.pk.indexOf(c.column) >= 0 ? '<span class="faint">🔑</span>' : '<button class="btn2 sm danger" data-drop="' + esc(c.column) + '">Drop</button>') + '</div>';
      }).join('');
      var ov = modal('Columns · ' + S.table,
        rows + '<hr style="border:0;border-top:1px solid var(--c-border);margin:14px 0"/>'
        + '<p class="faint" style="margin:0 0 6px">Add column</p>'
        + '<div class="kv"><input id="ac-name" placeholder="column" style="flex:1"/><select id="ac-type">' + typeOptions('text') + '</select></div>',
        function (ov, msg) {
          var cn = (ov.querySelector('#ac-name').value || '').trim();
          if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(cn)) { msg.textContent = 'Enter a valid column name to add (or Cancel).'; return; }
          runMigration('alter table "' + S.table + '" add column "' + cn + '" ' + ov.querySelector('#ac-type').value + ';', ov, msg, 'Column added');
        }, 'Add column');
      Array.prototype.forEach.call(ov.querySelectorAll('[data-drop]'), function (el) { el.onclick = function () {
        var c = el.getAttribute('data-drop'); if (!confirm('Drop column "' + c + '"? Data in it is lost.')) return;
        runMigration('alter table "' + S.table + '" drop column "' + c + '";', ov, ov.querySelector('#mm-msg'), 'Column dropped');
      }; });
    }

    // ── pgvector similarity search (admin scope, owner sees all rows) ─────
    function vectorSearchModal() {
      var vcols = (S.colMeta || []).filter(function (c) { return c.udt === 'vector'; }).map(function (c) { return c.column; });
      var ov = modal('Vector search · ' + S.table,

    // In-place manager (no bounce to the account page). Cloud Apps are

    function manageCloudDomains() {
      var ov = document.createElement('div'); ov.className = 'ov';
      ov.innerHTML = '<div class="modal"><h3>Custom domains</h3>'
        + '<p class="muted" style="margin:-6px 0 12px;font-size:.8rem">Point your own domain at an app deployed to LingCode Cloud. HTTPS is issued automatically once DNS points at us.</p>'

          : '<p class="faint" style="margin:0 0 8px"><b>' + esc(apps[0].title) + '</b></p>')

      function renderDomains(appId) {
        var dbox = ov.querySelector('#cdm-domains'); if (!dbox) return;
        var base = '/api/account/cloud-apps/' + encodeURIComponent(appId) + '/custom-domains';
        dbox.innerHTML = '<p class="faint">Loading…</p>';
        function dnsBlock(d) {
          return '<div style="background:var(--c-panel-2);border:1px solid var(--c-border-2);border-radius:7px;padding:8px 10px;font-size:.72rem;font-family:Geist Mono,monospace;margin-top:6px">'
            + 'Subdomain: <b>CNAME</b> ' + esc(d) + ' → <b>apps.lingcode.dev</b><br>'
            + 'Root/apex: <b>A</b> ' + esc(d) + ' → <b>138.197.107.228</b><br>'
            + '<span class="faint">DNS-only — not a Cloudflare-proxied (orange-cloud) record.</span></div>';
        }
        function siblingOf(d) {
          if (d.indexOf('.') < 0) return null;
          if (d.indexOf('www.') === 0) return d.slice(4);
          if (d.split('.').length === 2) return 'www.' + d;
          return null;
        }
        function render(rows) {
          dbox.innerHTML = (rows.length ? rows.map(function (r) {
            return '<div style="border:1px solid var(--c-border-2);border-radius:7px;padding:9px 11px;margin-bottom:8px">'
              + '<div style="display:flex;align-items:center;gap:8px"><b style="flex:1">' + esc(r.domain) + '</b>'
              + '<span class="cdm-st" data-d="' + esc(r.domain) + '" style="font-size:.7rem;color:var(--c-muted)">checking…</span>'
              + '<a href="https://' + esc(r.domain) + '" target="_blank" rel="noopener" style="font-size:.74rem;color:var(--c-accent)">open ↗</a>'
              + '<button class="btn2 sm" data-rm="' + esc(r.domain) + '">Remove</button></div>'
              + dnsBlock(r.domain) + '</div>';
          }).join('') : '<p class="muted" style="font-size:.85rem">No domains yet.</p>')
            + '<div style="display:flex;gap:8px;margin-top:6px"><input id="cdm-in" placeholder="app.yoursite.com" style="flex:1"/><button class="btn2 primary" id="cdm-add">Add</button></div>'
            + '<label class="inline" style="margin-top:8px"><input type="checkbox" id="cdm-sib" checked/> Also add the apex/www counterpart</label>'
            + '<p class="faint" id="cdm-msg" style="min-height:1em;margin:6px 0 0"></p>';
          Array.prototype.forEach.call(dbox.querySelectorAll('[data-rm]'), function (b) {
            b.onclick = function () { if (!confirm('Remove ' + b.getAttribute('data-rm') + '?')) return; apiW(base + '/' + encodeURIComponent(b.getAttribute('data-rm')), 'DELETE').then(load); };
          });
          Array.prototype.forEach.call(dbox.querySelectorAll('.cdm-st'), function (el) {
            api(base + '/' + encodeURIComponent(el.getAttribute('data-d')) + '/status').then(function (s) {
              if (s.ok && s.j && s.j.pointed) { el.textContent = '✓ verified'; el.style.color = '#00a86b'; }
              else { el.textContent = '⏳ pending DNS'; el.style.color = '#d08700'; }
            });
          });
          var addBtn = dbox.querySelector('#cdm-add');
          if (addBtn) addBtn.onclick = function () {
            var inp = dbox.querySelector('#cdm-in'), msg = dbox.querySelector('#cdm-msg');
            var d = inp.value.trim().toLowerCase().replace(/\.$/, ''); if (!d) return;
            var targets = [d]; var sib = siblingOf(d);
            if (sib && dbox.querySelector('#cdm-sib').checked) targets.push(sib);
            msg.textContent = 'Adding…';
            var firstErr = null, chain = Promise.resolve();
            targets.forEach(function (t) {
              chain = chain.then(function () { return apiW(base, 'POST', { domain: t }).then(function (res) { if (!res.ok && !firstErr) firstErr = (res.j && (res.j.message || res.j.error)) || 'Failed'; }); });
            });
            chain.then(function () { msg.textContent = firstErr || 'Added — set the DNS below, then it goes live in a few minutes.'; load(); });
          };
        }
        function load() { api(base).then(function (r) { render((r.ok && r.j && r.j.data) || []); }); }
        load();
      }
    }

    function renderUsageChart() {
      api(base() + '/usage?days=30').then(function (r) {

        var reads = data.map(function (d) { return Number(d.db_rows_read) || 0; });
        var writes = data.map(function (d) { return Number(d.db_rows_written) || 0; });
        box.innerHTML = sparkChart(data.map(function (d) { return d.day; }), [{ vals: reads, color: 'var(--c-accent)', label: 'reads' }, { vals: writes, color: 'var(--c-live)', label: 'writes' }]);
      });

    // Minimal inline-SVG multi-series line chart. No deps.
    function sparkChart(labels, series) {
      var W = 600, H = 160, pad = 24; var n = labels.length;
      var max = Math.max(1, Math.max.apply(null, series.map(function (s) { return Math.max.apply(null, s.vals.concat([0])); })));
      var x = function (i) { return pad + (n <= 1 ? 0 : (i * (W - 2 * pad) / (n - 1))); };
      var y = function (v) { return H - pad - (v / max) * (H - 2 * pad); };
      var paths = series.map(function (s) {
        var d = s.vals.map(function (v, i) { return (i ? 'L' : 'M') + x(i).toFixed(1) + ' ' + y(v).toFixed(1); }).join(' ');
        return '<path d="' + d + '" fill="none" stroke="' + s.color + '" stroke-width="2"/>';
      }).join('');
      var legend = series.map(function (s) { return '<span class="faint" style="margin-right:14px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:' + s.color + ';margin-right:5px"></span>' + esc(s.label) + '</span>'; }).join('');
      return '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none"><line class="axis" x1="' + pad + '" y1="' + (H - pad) + '" x2="' + (W - pad) + '" y2="' + (H - pad) + '"/>' + paths + '</svg>'
        + '<div style="margin-top:6px">' + legend + ' <span class="faint">· peak ' + max + '/day · ' + n + ' day' + (n === 1 ? '' : 's') + '</span></div>';
    }
    function renderApiDocs(b) {
      var box = document.getElementById('s-apidocs'); if (!box) return;
      var url = b.gateway_url || ('/api/cloud/be/' + b.backend_id); var key = b.anon_key || '<anon key>';
      var t = S.table || (S.tables[0] || 'your_table');
      var snip = function (title, code) { return '<p class="faint" style="margin:12px 0 4px">' + esc(title) + '</p><textarea class="sql" readonly style="min-height:80px">' + esc(code) + '</textarea>'; };
      var absUrl = (url.charAt(0) === '/') ? 'https://lingcode.dev' + url : url;
      var connect = '<script src="https://lingcode.dev/sdk/lingcode-v1.js"><\/script>\n<script>\n  const lingcode = LingCode.createClient("' + url + '", "' + key + '");\n<\/script>';
      box.innerHTML = '<p class="muted" style="margin:0 0 4px"><b>Recommended:</b> drop in the client SDK, then write Supabase-style code. Examples for <code>' + esc(t) + '</code>:</p>'
        + snip('Connect (one time)', connect)
        + snip('Select rows', 'const { data, error } = await lingcode.from("' + t + '").order("id", { ascending:false }).limit(20).select();')
        + snip('Insert a row', 'await lingcode.from("' + t + '").insert({ /* ... */ });')
        + snip('Update / delete (filter required)', 'await lingcode.from("' + t + '").eq("id", 1).update({ /* ... */ });\nawait lingcode.from("' + t + '").eq("id", 1).delete();')
        + snip('Sign in (passwordless)', 'await lingcode.auth.sendMagicLink({ email });\n// the SDK finalizes the link on return; await lingcode.ready then lingcode.auth.getUser()')
        + snip('Realtime', 'const off = lingcode.from("' + t + '").subscribe(({ type, row }) => { /* patch UI */ });')
        + snip('Upload a file', 'await lingcode.storage.from("public").upload("hello.txt", new Blob(["hi"]));')
        + '<p class="muted" style="margin:16px 0 4px">Analytics — track usage (shows in the Telemetry tab):</p>'
        + snip('Web (JS)', 'lingcode.telemetry.logEvent("signup", { plan: "pro" });\nlingcode.telemetry.setUserId("user_123");\nlingcode.telemetry.setUserProperties({ plan: "pro" });\nlingcode.telemetry.logScreen("Home");')
        + snip('Native (Swift — add the LingCodeAnalytics Swift package)', 'import LingCodeAnalytics\n\nlet analytics = LingCodeAnalytics(\n  url: "' + absUrl + '", anonKey: "' + key + '", appVersion: "1.0.0")\nanalytics.logEvent("signup", params: ["plan": "pro"])\nanalytics.setUserId("user_123")\nanalytics.setUserProperties(["plan": "pro"])')
        + '<p class="muted" style="margin:16px 0 4px">Advanced — raw HTTP (no SDK):</p>'
        + snip('Select rows (fetch)', 'fetch("' + url + '/select", {\n  method: "POST",\n  headers: { Authorization: "Bearer ' + key + '", "Content-Type": "application/json" },\n  body: JSON.stringify({ table: "' + t + '", limit: 20 })\n}).then(r => r.json())');
    }

    load();
  })();
