  <style>
    .pwd-page { min-height: 100vh; display: flex; flex-direction: column; }
    .pwd-card-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 120px 24px 48px; }
    .pwd-card {
      width: 100%; max-width: 400px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px;
    }
    .pwd-card h1 { font-size: 1.375rem; margin: 0 0 8px; letter-spacing: -0.02em; }
    .pwd-card .sub { color: var(--text-muted); font-size: 0.9375rem; margin: 0 0 24px; line-height: 1.5; }
    .pwd-field { margin-bottom: 16px; }
    .pwd-field label { display: block; font-size: 0.8125rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .pwd-field input {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-strong);
      background: var(--bg); color: var(--text); font-size: 1rem; font-family: var(--font);
    }
    .pwd-field input:focus { outline: none; border-color: var(--signal); }
    .pwd-msg { font-size: 0.9375rem; line-height: 1.5; margin-top: 16px; color: var(--text-muted); }
    .pwd-msg.ok { color: var(--text); }
    .pwd-err { color: var(--red); font-size: 0.875rem; margin-top: 12px; min-height: 1.25em; }
    .pwd-card .btn { width: 100%; justify-content: center; margin-top: 8px; }
    .pwd-back { margin-top: 20px; text-align: center; }
    .pwd-back a { color: var(--text-muted); font-size: 0.875rem; text-decoration: none; }
    .pwd-back a:hover { color: var(--signal); }
  </style>

</head>

  <div class="pwd-card-wrap">
    <div class="pwd-card">
      <h1>Forgot password</h1>
      <p class="sub">Enter your account email. If it exists, we will send a link to set a new password.</p>
      <form id="form">
        <div class="pwd-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Send reset link</button>
        <p class="pwd-err" id="err"></p>
        <p class="pwd-msg" id="msg" hidden></p>
      </form>
      <div class="pwd-back"><a href="/signin.html">Back to sign in</a></div>
    </div>
  </div>

  <script src="nav.js?v=202605131900" defer></script>
  <script>
(function () {
  var form = document.getElementById('form');
  var err = document.getElementById('err');
  var msg = document.getElementById('msg');
  var btn = document.getElementById('submit-btn');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.textContent = '';
    msg.hidden = true;
    btn.disabled = true;
    var email = document.getElementById('email').value.trim();
    fetch('/api/account/forgot-password', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
      .then(function (r) {
        return r.json().then(function (j) {
          return { ok: r.ok, status: r.status, j: j };
        });
      })
      .then(function (x) {
        btn.disabled = false;
        if (!x.ok) {
          err.textContent = (x.j && x.j.error) || 'Request failed';
          return;
        }
        msg.hidden = false;
        msg.className = 'pwd-msg ok';
        msg.textContent = x.j.message || 'If an account exists for that email, we sent a reset link.';
        form.querySelector('.pwd-field').style.display = 'none';
        btn.style.display = 'none';
      })
      .catch(function () {
        btn.disabled = false;
        err.textContent = 'Network error. Try again.';
      });
  });
})();
  </script>
<script src="/nav-auth.js" defer></script>
