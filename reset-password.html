      width: 100%; max-width: 400px;

    .pwd-card .sub { color: var(--text-muted); font-size: 0.9375rem; margin: 0 0 24px; line-height: 1.5; }
    .pwd-field { margin-bottom: 16px; }
    .pwd-field label { display: block; font-size: 0.8125rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .pwd-field input {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-strong);

    .pwd-field input:focus { outline: none; border-color: var(--signal); }

  <div class="pwd-card-wrap">
    <div class="pwd-card">
      <h1>Set a new password</h1>
      <p class="sub" id="sub">Choose a password with at least 8 characters. You will need to sign in again on each device.</p>
      <form id="form">
        <div class="pwd-field">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Update password</button>
        <p class="pwd-err" id="err"></p>
      </form>
      <div class="pwd-back"><a href="/signin.html">Sign in</a></div>
    </div>
  </div>

  <script src="nav.js?v=202605131900" defer></script>
  <script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var form = document.getElementById('form');
  var err = document.getElementById('err');
  var btn = document.getElementById('submit-btn');
  var sub = document.getElementById('sub');
  if (!token || !token.trim()) {
    sub.textContent = 'This page needs a valid link from your email. Request a new reset from the forgot password page.';
    form.style.display = 'none';
    return;
  }
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true;
    var password = document.getElementById('password').value;
    fetch('/api/account/reset-password', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token.trim(), password: password })
    })
      .then(function (r) {
        return r.json().then(function (j) {
          return { ok: r.ok, j: j };
        });
      })
      .then(function (x) {
        if (!x.ok) {
          btn.disabled = false;
          err.textContent = (x.j && x.j.error) || 'Could not reset password';
          return;
        }
        sub.textContent = 'Your password was updated. You can sign in now.';
        form.style.display = 'none';
      })
      .catch(function () {
        btn.disabled = false;
        err.textContent = 'Network error. Try again.';
      });
  });
})();
  </script>
