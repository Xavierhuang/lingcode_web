# Add inside the server { } block for lingcode.dev (e.g. in /etc/nginx/sites-enabled/lingcode.dev).
#
# ─── IMPORTANT: binary downloads vs SPA fallback ─────────────────────────────
# If you use `try_files $uri /index.html` for the marketing site, a MISSING .dmg
# will incorrectly return index.html (200). Browsers may save that as
# "Something.dmg.html" because the body is HTML. Fix:
#   1) Put the real file at /var/www/html/LingCode-v2.7.0-Installer.dmg (rsync from website/).
#   2) Add this block *before* the generic `location /` that falls back to index.html:
#
#   location ~* \.(dmg|pkg)$ {
#       root /var/www/html;
#       default_type application/octet-stream;
#       try_files $uri =404;
#   }
#
# That way a missing DMG is 404 (HTML error page), not the homepage — and when the
# file exists, nginx serves bytes with the right type.
#
# Node API (127.0.0.1:3000): admin, OAuth, Stripe webhooks (/api/stripe/webhook), billing APIs.
#   location /api/ {
#     proxy_pass http://127.0.0.1:3000/api/;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#   }
#   location /oauth/ {
#     proxy_pass http://127.0.0.1:3000/oauth/;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#   }
# Run: cd /path/to/website/server && npm install && NODE_ENV=production node index.js (use systemd; see server .env.example)
# Fix 1: Ensure .mov is served as video/quicktime so browsers can play it.
# Fix 2: If videos/DMG return 413 or 500, uncomment client_max_body_size in the server block.

# In the server { } block, add or merge a "types" block so .mov has the right MIME type:
#   types {
#     video/quicktime mov;
#   }
# If you already have "include /etc/nginx/mime.types;", add after it:
#   types { video/quicktime mov; }
# (nginx merges types; video/quicktime for .mov is often missing on minimal installs.)

# If large file downloads fail (500/413), add inside server { }:
#   client_max_body_size 0;

# After editing: sudo nginx -t && sudo systemctl reload nginx
